name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    services:
      # SQLite doesn't need a service, using file-based DB
      # Keep placeholder for future Postgres/MySQL
      pass

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

      - name: Check coverage thresholds
        run: |
          # Extract coverage percentage from lcov
          COVERAGE=$(grep -oP '\.*\.ts"\>\n\<percent covered="\K[0-9.]+' coverage/lcov.info | head -1)
          echo "Overall coverage: ${COVERAGE}%"
          # Fail if below 70%
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "Coverage below 70%!"
            exit 1
          fi
        shell: bash

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true  # Don't fail on moderate issues for now

      - name: Check for vulnerable dependencies
        run: |
          npm audit --audit-level=high || true
          # TODO: Fail on high/critical in the future

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build

      - name: Verify build output exists
        run: test -d dist && test -f dist/server.js
